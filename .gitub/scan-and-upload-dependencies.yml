name: scan-and-curate-python-dependencies

on:
  push:
    branches:
      - main
    paths:
      - requirements.txt
      - .github/workflows/scan-and-curate-python-dependencies.yml
  workflow_dispatch:

jobs:
  scan-and-publish:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.12"
      AZURE_ARTIFACTS_FEED_URL: "https://pkgs.dev.azure.com/<ORG>/<PROJECT>/_packaging/<FEED>/pypi/upload/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit twine wheel build

      - name: Audit requirements.txt
        run: |
          pip-audit -r requirements.txt

      - name: Download package artifacts
        run: |
          mkdir -p vendor
          python -m pip download -r requirements.txt -d vendor

      - name: Build .pypirc for Azure Artifacts
        run: |
          cat > ~/.pypirc <<EOF
          [distutils]
          index-servers =
              internal-feed

          [internal-feed]
          repository = ${AZURE_ARTIFACTS_FEED_URL}
          username = ${TWINE_USERNAME}
          password = ${TWINE_PASSWORD}
          EOF
        env:
          TWINE_USERNAME: ${{ secrets.AZURE_ARTIFACTS_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.AZURE_ARTIFACTS_PAT }}

      - name: Upload downloaded packages to Azure Artifacts
        run: |
          python -m twine upload -r internal-feed vendor/*