name: scan-and-publish-python-dependencies

on:
  pull_request:
    branches:
      - main
    paths:
      - pyproject.toml
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:

jobs:
  scan:
    if: github.event.action != 'closed'
    runs-on: macos-latest

    env:
      PYTHON_VERSION: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v5
      
      # temp
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
    
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install "twine<6.2"
        
      - name: Download package artifacts
        run: |
          mkdir -p packages
          python -m pip download pyproject.toml -d packages

  publish:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: macos-latest

    env:
      PYTHON_VERSION: "3.12"
      AZURE_ARTIFACTS_FEED_URL: "https://pkgs.dev.azure.com/meretringwald/private-feed/_packaging/private-packages/pypi/upload/"

    steps:
      - name: Checkout merged main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
    
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install "twine<6.2"
        
      - name: Download package artifacts
        run: |
          mkdir -p packages
          python -m pip download pyproject.toml -d packages

      - name: Configure Twine for Azure Artifacts
        run: |
          cat > ~/.pypirc <<EOF
          [distutils]
          index-servers =
              private-packages

          [private-packages]
          repository = ${AZURE_ARTIFACTS_FEED_URL}
          username = ${TWINE_USERNAME}
          password = ${TWINE_PASSWORD}
          EOF
        env:
          TWINE_USERNAME: ${{ secrets.AZURE_ARTIFACTS_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.AZURE_ARTIFACTS_PAT }}

      - name: Upload packages to Azure Artifacts
        run: |
          python -m twine upload --skip-existing -r private-packages packages/*