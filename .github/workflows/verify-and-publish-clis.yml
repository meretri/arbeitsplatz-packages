name: verify-and-publish-databricks-cli

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:

env:
  DATABRICKS_CLI_VERSION: "1.2.1"
  AZURE_DEVOPS_ORG_URL: "https://dev.azure.com/meretringwald"
  AZURE_DEVOPS_PROJECT: "private-feed"
  AZURE_ARTIFACTS_FEED: "private-packages"
  UNIVERSAL_PACKAGE_NAME: "databricks-cli-macos"

jobs:
  verify:
    if: github.event.action != 'closed'
    runs-on: macos-latest

    steps:
      - name: Prepare workspace
        run: mkdir -p cli-payload/databricks-cli

      - name: Download Databricks CLI and checksum
        working-directory: cli-payload/databricks-cli
        run: |
          VERSION="${DATABRICKS_CLI_VERSION}"
          BASE_URL="https://github.com/databricks/cli/releases/download/v${VERSION}"

          curl -L -o "databricks_cli_${VERSION}_darwin_amd64.zip" \
            "${BASE_URL}/databricks_cli_${VERSION}_darwin_amd64.zip"

          curl -L -o "databricks_cli_${VERSION}_SHA256SUMS" \
            "${BASE_URL}/databricks_cli_${VERSION}_SHA256SUMS"

      - name: Verify checksum
        working-directory: cli-payload/databricks-cli
        run: |
          VERSION="${DATABRICKS_CLI_VERSION}"
          FILE="databricks_cli_${VERSION}_darwin_amd64.zip"

          EXPECTED_SHA=$(grep "${FILE}" "databricks_cli_${VERSION}_SHA256SUMS" | awk '{print $1}')
          ACTUAL_SHA=$(shasum -a 256 "${FILE}" | awk '{print $1}')

          echo "Expected: ${EXPECTED_SHA}"
          echo "Actual:   ${ACTUAL_SHA}"

          test -n "${EXPECTED_SHA}"
          test "${EXPECTED_SHA}" = "${ACTUAL_SHA}"

      - name: Unpack CLI
        working-directory: cli-payload/databricks-cli
        run: |
          VERSION="${DATABRICKS_CLI_VERSION}"
          unzip -o "databricks_cli_${VERSION}_darwin_amd64.zip"

      - name: Verify CLI version output
        working-directory: cli-payload/databricks-cli
        run: |
          ./databricks version | tee version.txt
          ./databricks version | grep "v${DATABRICKS_CLI_VERSION}"

  publish:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: macos-latest

    steps:
      - name: Prepare workspace
        run: mkdir -p cli-payload/databricks-cli

      - name: Download Databricks CLI and checksum
        working-directory: cli-payload/databricks-cli
        run: |
          VERSION="${DATABRICKS_CLI_VERSION}"
          BASE_URL="https://github.com/databricks/cli/releases/download/v${VERSION}"

          curl -L -o "databricks_cli_${VERSION}_darwin_amd64.zip" \
            "${BASE_URL}/databricks_cli_${VERSION}_darwin_amd64.zip"

          curl -L -o "databricks_cli_${VERSION}_SHA256SUMS" \
            "${BASE_URL}/databricks_cli_${VERSION}_SHA256SUMS"

      - name: Verify checksum
        working-directory: cli-payload/databricks-cli
        run: |
          VERSION="${DATABRICKS_CLI_VERSION}"
          FILE="databricks_cli_${VERSION}_darwin_amd64.zip"

          EXPECTED_SHA=$(grep "${FILE}" "databricks_cli_${VERSION}_SHA256SUMS" | awk '{print $1}')
          ACTUAL_SHA=$(shasum -a 256 "${FILE}" | awk '{print $1}')

          echo "Expected: ${EXPECTED_SHA}"
          echo "Actual:   ${ACTUAL_SHA}"

          test -n "${EXPECTED_SHA}"
          test "${EXPECTED_SHA}" = "${ACTUAL_SHA}"

      - name: Unpack CLI
        working-directory: cli-payload/databricks-cli
        run: |
          VERSION="${DATABRICKS_CLI_VERSION}"
          unzip -o "databricks_cli_${VERSION}_darwin_amd64.zip"

      - name: Verify CLI version output
        working-directory: cli-payload/databricks-cli
        run: |
          ./databricks version | tee version.txt
          ./databricks version | grep "v${DATABRICKS_CLI_VERSION}"

      - name: Install Azure CLI
        run: |
          brew update
          brew install azure-cli

      - name: Add Azure DevOps extension
        run: |
          az extension add --name azure-devops --yes || az extension update --name azure-devops

      - name: Publish as Universal Package
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_ARTIFACTS_PAT }}
        run: |
          az devops configure --defaults organization="${AZURE_DEVOPS_ORG_URL}" project="${AZURE_DEVOPS_PROJECT}"

          az artifacts universal publish \
            --organization "${AZURE_DEVOPS_ORG_URL}" \
            --project "${AZURE_DEVOPS_PROJECT}" \
            --scope project \
            --feed "${AZURE_ARTIFACTS_FEED}" \
            --name "${UNIVERSAL_PACKAGE_NAME}" \
            --version "${DATABRICKS_CLI_VERSION}" \
            --path "cli-payload/databricks-cli" \
            --description "Databricks CLI macOS payload verified by checksum and version output"